<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenAI 代理配置</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --danger: #dc2626;
      --warn: #b45309;
      --border: #e5e7eb;
      --soft: #f9fafb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 20px 16px 28px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
    }

    h2 {
      margin: 0;
      font-size: 14px;
    }

    .hint {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .status-pill,
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-pill.enabled,
    .tag.ok {
      color: var(--accent-strong);
      background: #eff6ff;
    }

    .status-pill.disabled,
    .tag.bad {
      color: var(--danger);
      background: #fef2f2;
    }

    .tag.warn {
      color: var(--warn);
      background: #fff7ed;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .panel + .panel {
      margin-top: 12px;
    }

    .panel-body {
      padding: 16px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
    }

    input[type="url"],
    textarea,
    select {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      line-height: 1.5;
    }

    textarea {
      min-height: 128px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 12px;
      align-items: start;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .actions,
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }

    .actions {
      justify-content: flex-start;
      padding-top: 2px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 14px;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }

    button.secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .message {
      min-height: 20px;
      color: var(--muted);
      font-size: 12px;
    }

    .message.success {
      color: var(--accent-strong);
    }

    .message.error {
      color: var(--danger);
    }

    .summary {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .key-list {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .key-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--soft);
      font-size: 12px;
    }

    .key-name {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow-wrap: anywhere;
    }

    .empty {
      margin-top: 12px;
      padding: 14px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      background: var(--soft);
      font-size: 12px;
      text-align: center;
    }

    .endpoints {
      margin-top: 14px;
      display: grid;
      gap: 8px;
    }

    .endpoint {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--soft);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    code {
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }

    @media (max-width: 720px) {
      .header,
      .endpoint,
      .key-row {
        display: grid;
        align-items: start;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div>
        <h1>OpenAI 代理配置</h1>
        <p class="hint">配置上游 Base URL、协议能力和 API Key 池。代理对外始终提供 Chat 与 Responses 接口。</p>
      </div>
      <span id="state-pill" class="status-pill disabled">未启用</span>
    </header>

    <section class="panel">
      <div class="panel-body">
        <form id="config-form">
          <label>
            Base URL
            <input id="base_url" type="url" placeholder="https://api.openai.com" required />
            <span class="hint">填写服务根地址即可，带不带 /v1 都可以。</span>
          </label>

          <label>
            API Keys
            <textarea id="api_keys" placeholder="每行一个 API Key，例如 sk-..."></textarea>
          </label>

          <div class="grid">
            <label>
              上游协议
              <select id="protocol_mode">
                <option value="both">上游支持 Chat + Responses</option>
                <option value="chat">上游仅支持 Chat Completions</option>
                <option value="responses">上游仅支持 Responses</option>
              </select>
              <span class="hint">如果上游只支持一种协议，代理会自动转换另一种入站协议。</span>
            </label>

            <label class="checkbox">
              <input id="enabled" type="checkbox" />
              启用代理
            </label>
          </div>

          <div class="actions">
            <button id="save-btn" type="submit">保存配置</button>
            <span id="message" class="message"></span>
          </div>
        </form>
      </div>
    </section>

    <section class="panel">
      <div class="panel-body">
        <div class="section-head">
          <h2>Key 状态</h2>
          <button id="unban-all-btn" class="secondary" type="button">全部解禁</button>
        </div>
        <div id="key-summary" class="summary"></div>
        <div id="key-list" class="key-list"></div>
      </div>
    </section>

    <section class="endpoints">
      <div class="endpoint">
        <span>Chat Completions</span>
        <code>POST /v1/chat/completions</code>
      </div>
      <div class="endpoint">
        <span>Responses</span>
        <code>POST /v1/responses</code>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("config-form");
    const baseUrlInput = document.getElementById("base_url");
    const apiKeysInput = document.getElementById("api_keys");
    const protocolModeInput = document.getElementById("protocol_mode");
    const enabledInput = document.getElementById("enabled");
    const saveBtn = document.getElementById("save-btn");
    const messageEl = document.getElementById("message");
    const statePill = document.getElementById("state-pill");
    const keySummary = document.getElementById("key-summary");
    const keyList = document.getElementById("key-list");
    const unbanAllBtn = document.getElementById("unban-all-btn");

    function setMessage(text, type = "") {
      messageEl.textContent = text || "";
      messageEl.className = type ? `message ${type}` : "message";
    }

    function setBusy(busy) {
      saveBtn.disabled = busy;
      saveBtn.textContent = busy ? "保存中..." : "保存配置";
    }

    function renderState(enabled) {
      statePill.textContent = enabled ? "已启用" : "未启用";
      statePill.className = `status-pill ${enabled ? "enabled" : "disabled"}`;
    }

    function parseApiKeys() {
      return apiKeysInput.value
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);
    }

    function formatTime(timestamp) {
      if (!timestamp) return "-";
      return new Date(timestamp * 1000).toLocaleString();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fileModeMessage() {
      return "当前是直接打开 HTML 文件，无法连接管理 API。请先启动服务，然后访问 http://127.0.0.1:8080/admin。";
    }

    function friendlyFetchError(error) {
      if (location.protocol === "file:") {
        return fileModeMessage();
      }
      if (error && error.message === "Failed to fetch") {
        return "无法连接管理 API，请确认代理服务已启动，并从 /admin 页面访问。";
      }
      return error && error.message ? error.message : "请求失败";
    }

    async function request(url, options = {}) {
      if (location.protocol === "file:") {
        throw new Error(fileModeMessage());
      }

      let response;
      try {
        response = await fetch(url, {
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
          ...options,
        });
      } catch (error) {
        throw new Error(friendlyFetchError(error));
      }

      const text = await response.text();
      let data = null;
      if (text) {
        try {
          data = JSON.parse(text);
        } catch (_) {
          data = { error: text };
        }
      }

      if (!response.ok) {
        throw new Error((data && data.error) || `请求失败：${response.status}`);
      }

      return data;
    }

    function fillForm(config) {
      baseUrlInput.value = config.base_url || "";
      apiKeysInput.value = (config.api_keys || []).join("\n");
      protocolModeInput.value = config.protocol_mode || "both";
      enabledInput.checked = Boolean(config.enabled);
      renderState(Boolean(config.enabled));
      renderKeyStatus(config.key_statuses || []);
    }

    function renderKeyStatus(statuses) {
      const total = statuses.length;
      const banned = statuses.filter((item) => item.banned).length;
      const totalFailures = statuses.reduce((sum, item) => sum + (item.fail_count || 0), 0);
      const available = total - banned;

      keySummary.innerHTML = `
        <span class="tag ok">可用 ${available}/${total}</span>
        <span class="tag bad">封禁 ${banned}</span>
        <span class="tag warn">总失败 ${totalFailures} 次</span>
      `;

      if (!statuses.length) {
        keyList.innerHTML = '<div class="empty">暂无 API Key</div>';
        return;
      }

      keyList.innerHTML = statuses.map((item) => `
        <div class="key-row">
          <span class="key-name">${item.index + 1}. ${escapeHtml(item.masked_key)}</span>
          <span class="tag ${item.banned ? "bad" : item.fail_count > 0 ? "warn" : "ok"}">
            ${item.banned ? `已封禁至 ${formatTime(item.ban_until)}` : item.fail_count > 0 ? `失败 ${item.fail_count} 次` : "正常"}
          </span>
          <button class="secondary" type="button" data-unban="${item.index}" ${item.fail_count === 0 && !item.banned ? "disabled" : ""}>解禁</button>
        </div>
      `).join("");
    }

    async function loadConfig() {
      const config = await request("/admin/api/config");
      fillForm(config);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setBusy(true);
      setMessage("正在保存...");

      try {
        await request("/admin/api/config", {
          method: "PUT",
          body: JSON.stringify({
            base_url: baseUrlInput.value,
            api_keys: parseApiKeys(),
            protocol_mode: protocolModeInput.value,
            enabled: enabledInput.checked,
          }),
        });
        await loadConfig();
        setMessage("已保存。", "success");
      } catch (error) {
        setMessage(error.message, "error");
      } finally {
        setBusy(false);
      }
    });

    keyList.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-unban]");
      if (!button) return;
      button.disabled = true;
      try {
        await request(`/admin/api/keys/${button.dataset.unban}/unban`, { method: "POST" });
        await loadConfig();
        setMessage("已解禁。", "success");
      } catch (error) {
        setMessage(error.message, "error");
      }
    });

    unbanAllBtn.addEventListener("click", async () => {
      unbanAllBtn.disabled = true;
      try {
        await request("/admin/api/keys/unban-all", { method: "POST" });
        await loadConfig();
        setMessage("已全部解禁。", "success");
      } catch (error) {
        setMessage(error.message, "error");
      } finally {
        unbanAllBtn.disabled = false;
      }
    });

    loadConfig().catch((error) => {
      setMessage(friendlyFetchError(error), "error");
    });
  </script>
</body>
</html>
